name: CD
concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: CI
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Build
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Euno-HQ

      - name: Resolve PR context
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`
            });
            if (prs.data.length > 0 && !prs.data[0].draft) {
              const pr = prs.data[0];
              const hasNoPreview = pr.labels.some(l => l.name === 'no-preview');
              core.setOutput('pr_number', String(pr.number));
              core.setOutput('has_no_preview_label', String(hasNoPreview));
            } else {
              core.setOutput('pr_number', '');
              core.setOutput('has_no_preview_label', 'false');
            }

      - name: Dispatch deploy to hosting
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Euno-HQ',
              repo: 'hosting',
              event_type: 'deploy',
              client_payload: {
                app_name: 'mod-bot',
                statefulset_name: 'mod-bot-set',
                secret_name: 'modbot-env',
                staging_secret_name: 'modbot-staging-env',
                source_repo: '${{ github.repository }}',
                source_ref: '${{ github.ref }}',
                source_sha: '${{ github.sha }}',
                source_default_branch: '${{ github.event.repository.default_branch }}',
                image_tag: 'sha-${{ github.sha }}',
                pr_context: JSON.stringify({
                  number: '${{ steps.pr-context.outputs.pr_number }}',
                  has_no_preview_label: '${{ steps.pr-context.outputs.has_no_preview_label }}'
                })
              }
            });
            console.log('Dispatched deploy event to Euno-HQ/hosting');
