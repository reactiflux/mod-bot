apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mod-bot-uat
  namespace: staging
  labels:
    app: mod-bot-uat
spec:
  serviceName: mod-bot-uat
  replicas: 1
  selector:
    matchLabels:
      app: mod-bot-uat
  template:
    metadata:
      labels:
        app: mod-bot-uat
    spec:
      containers:
        - name: mod-bot
          image: ghcr.io/euno-hq/discord:sha-${COMMIT_SHA}
          imagePullPolicy: Always
          command: ["npm", "run", "start:staging"]
          ports:
            - containerPort: 3000
          volumeMounts:
            - mountPath: "/data"
              name: mod-bot-data
          envFrom:
            - secretRef:
                name: modbot-staging-env
          env:
            - name: ENVIRONMENT
              value: staging
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 3000
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: mod-bot-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 256Mi
        storageClassName: do-block-storage
---
apiVersion: v1
kind: Service
metadata:
  name: mod-bot-uat
  namespace: staging
  labels:
    app: mod-bot-uat
spec:
  selector:
    app: mod-bot-uat
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mod-bot-uat
  namespace: staging
  labels:
    app: mod-bot-uat
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: uat.euno-staging.reactiflux.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mod-bot-uat
                port:
                  number: 80
  tls:
    - hosts:
        - uat.euno-staging.reactiflux.com
      secretName: wildcard-staging-tls
